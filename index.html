<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#090909">
<title>Aura AI</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQXVyYSBBSSIsInNob3J0X25hbWUiOiJBdXJhIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwOTA5MDkiLCJ0aGVtZV9jb2xvciI6IiNmZjdhMDAifQ==">
<style>
:root{--bg:#090909;--bg-2:#111;--bg-3:#1a1a1a;--accent:#ff7a00;--text:#fff;--text-2:#a0aec0;--glass:rgba(22,26,34,0.6);--radius:20px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#090909 0%,#111 60%,rgba(255,122,0,0.1) 100%);color:var(--text);height:100vh;overflow:hidden;animation:gradientMove 20s ease infinite;background-size:200% 200%;}
@keyframes gradientMove{0%{background-position:0% 0%}50%{background-position:100% 100%}100%{background-position:0% 0%}}
#welcome{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity.5s;}
.logo{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),#ff9a3d);border-radius:24px;margin-bottom:20px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,122,0,0.7)}50%{box-shadow:0 0 0 20px rgba(255,122,0,0)}}
#welcome h1{font-size:2rem;margin-bottom:10px}
#rotatingMsg{color:var(--text-2);height:24px;font-size:1.1rem;animation:fade.8s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.btn-primary{margin-top:30px;padding:14px 40px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:1rem;cursor:pointer;transition:transform.2s,box-shadow.2s;}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,122,0,0.5)}
#app{display:none;height:100vh;flex-direction:column}
header{padding:16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:var(--glass);border-bottom:1px solid rgba(255,122,0,0.1)}
.hamburger{font-size:24px;cursor:pointer;padding:8px}
.header-title{font-weight:700;font-size:1.1rem;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#sidebar{position:fixed;left:-300px;top:0;height:100%;width:280px;background:var(--bg-2);z-index:50;transition:left.3s;padding:20px;border-right:1px solid rgba(255,122,0,0.1)}
#sidebar.open{left:0}
.sidebar-item{padding:12px 16px;border-radius:12px;margin:4px 0;cursor:pointer;transition:background.2s}
.sidebar-item:hover{background:rgba(255,122,0,0.1)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;z-index:40}
#chatArea{flex:1;overflow-y:auto;padding:20px;padding-bottom:100px}
.dynamicTitle{text-align:center;font-size:1.8rem;font-weight:800;margin:20px 0;background:linear-gradient(90deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleChange 3s infinite;}
@keyframes titleChange{0%,100%{opacity:1}50%{opacity:0.6}}
.suggested{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin:20px 0}
.card{background:var(--glass);backdrop-filter:blur(20px);padding:16px;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:transform.2s,box-shadow.2s}
.card:hover{transform:translateY(-4px);box-shadow:0 0 20px rgba(255,122,0,0.3);border-color:var(--accent)}
.message{display:flex;margin:16px 0;animation:fadeIn.3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{justify-content:flex-end}
.bubble{max-width:80%;padding:14px 18px;border-radius:18px;line-height:1.5;position:relative}
.user.bubble{background:var(--accent);border-bottom-right-radius:4px}
.ai.bubble{background:var(--bg-3);border:1px solid rgba(255,122,0,0.1);border-bottom-left-radius:4px}
.timestamp{font-size:0.7rem;color:var(--text-2);margin-top:4px}
.actions{position:absolute;top:-10px;right:0;display:none;gap:6px}
.bubble:hover.actions{display:flex}
.action-btn{background:var(--bg-2);border:none;color:var(--text);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:0.8rem}
.typing{display:inline-block;width:8px;height:8px;background:var(--accent);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,50%,100%{opacity:1}25%,75%{opacity:0}}
#inputArea{position:fixed;bottom:0;left:0;right:0;padding:12px;backdrop-filter:blur(20px);background:var(--glass);border-top:1px solid rgba(255,122,0,0.1);display:flex;gap:10px;align-items:flex-end}
#input{flex:1;background:var(--bg-3);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:12px 16px;color:var(--text);resize:none;max-height:120px;font-family:inherit}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform.2s}
.send-btn:active{transform:scale(0.9)}
pre{background:#000;padding:12px;border-radius:12px;overflow-x:auto;border:1px solid rgba(255,122,0,0.2)}
code{font-family:'Courier New',monospace;color:var(--accent)}
table{width:100%;border-collapse:collapse;margin:10px 0}
td,th{border:1px solid rgba(255,122,0,0.2);padding:8px}
#download-gateway-modal{position: fixed; top: 0; left: 0; width: 100%; height: 100%;background: rgba(15, 17, 21, 0.95); display: flex; align-items: center;justify-content: center; z-index: 9999; font-family: sans-serif; backdrop-filter: blur(5px);}
@media(max-width:600px){.suggested{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="welcome">
  <div class="logo"></div>
  <h1>Aura AI</h1>
  <div id="rotatingMsg">Welcome 👋</div>
  <button class="btn-primary" onclick="startApp()">Start Chat</button>
</div>

<div id="app">
  <header>
    <div class="hamburger" onclick="toggleSidebar()">☰</div>
    <div class="header-title">Aura AI</div>
    <div onclick="newChat()">＋</div>
  </header>

  <div id="sidebar">
    <div class="sidebar-item" onclick="newChat()">＋ New Chat</div>
    <div id="historyList"></div>
    <div class="sidebar-item" onclick="alert('Settings coming soon')">⚙️ Settings</div>
  </div>
  <div id="overlay" onclick="toggleSidebar()"></div>

  <div id="chatArea">
    <div class="dynamicTitle" id="dynamicTitle">ASK FOR ANYTHING</div>
    <div class="suggested" id="suggestedPrompts">
      <div class="card" onclick="sendPrompt('Explain Quantum Computing simply')">Explain Quantum Computing simply</div>
      <div class="card" onclick="sendPrompt('Write a business plan')">Write a business plan</div>
      <div class="card" onclick="sendPrompt('Create Python code')">Create Python code</div>
      <div class="card" onclick="sendPrompt('Summarize this PDF')">Summarize this PDF</div>
    </div>
    <div id="messages"></div>
  </div>

  <div id="inputArea">
    <textarea id="input" placeholder="Message Aura AI..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
/* ================= STATE ================= */
let chats = JSON.parse(localStorage.getItem('aura_chats')||'[]');
let currentChatId = null;
let abortController = null;
let messageCount = parseInt(localStorage.getItem('aura_msg_count')||'0');
const ADSTERRA_LINK = "https://potterynaggingformerly.com/x58ii5d6m?key=10d4fbb0315a85d05075c184f47319a2";

/* ================= INIT ================= */
if(localStorage.getItem('aura_first_launch')!=='false'){
  const msgs = ["Welcome 👋","What will we build today?","Need help?","Ready when you are.","Let's solve something."];
  let i=0;setInterval(()=>{if(document.getElementById('rotatingMsg'))document.getElementById('rotatingMsg').textContent=msgs[i++%msgs.length]},2000);
}else{startApp()}

function startApp(){
  localStorage.setItem('aura_first_launch','false');
  document.getElementById('welcome').style.opacity=0;
  setTimeout(()=>{document.getElementById('welcome').style.display='none';document.getElementById('app').style.display='flex';loadHistory()},500);
  rotateTitle();
}

/* ================= CHAT LOGIC ================= */
function newChat(){
  currentChatId = Date.now();
  chats.unshift({id:currentChatId,title:"New Chat",messages:[]});
  saveChats();
  document.getElementById('messages').innerHTML='';
  document.getElementById('suggestedPrompts').style.display='grid';
  toggleSidebar();
}

function sendPrompt(text){document.getElementById('input').value=text;sendMessage()}

async function sendMessage(){
  const input = document.getElementById('input');
  const text = input.value.trim();if(!text)return;
  input.value='';

  if(!currentChatId)newChat();
  addMessage('user',text);
  document.getElementById('suggestedPrompts').style.display='none';

  // ADSTERRA GATE: Show ad every 5 messages for free users
  messageCount++;
  localStorage.setItem('aura_msg_count', messageCount);
  const isPro = localStorage.getItem('aura_is_pro') === 'true';
  if(messageCount % 5 === 0 &&!isPro){
    prepareDownload(); // Show ad modal
    return;
  }

  const aiMsgId = addMessage('ai','<span class="typing"></span>');
  await streamGemini(text,aiMsgId);
}

function addMessage(role,content){
  const msgId = Date.now();
  const chat = chats.find(c=>c.id===currentChatId);
  chat.messages.push({id:msgId,role,content,time:new Date().toLocaleTimeString()});
  renderMessage({id:msgId,role,content,time:chat.messages.at(-1).time});
  saveChats();
  return msgId;
}

function renderMessage(msg){
  const div = document.createElement('div');
  div.className=`message ${msg.role}`;
  div.innerHTML=`<div class="bubble"><div class="actions"><button class="action-btn" onclick="navigator.clipboard.writeText(this.parentElement.nextElementSibling.innerText)">Copy</button></div><div>${renderMarkdown(msg.content)}</div><div class="timestamp">${msg.time}</div></div>`;
  document.getElementById('messages').appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

/* ================= GEMINI VIA VERCEL ================= */
async function streamGemini(prompt,msgId){
  abortController = new AbortController();
  const chat = chats.find(c=>c.id===currentChatId);
  const history = chat.messages.map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.content}]}));
  const userId = localStorage.getItem('aura_user_id') || Date.now();
  localStorage.setItem('aura_user_id', userId);
  const isPro = localStorage.getItem('aura_is_pro') === 'true';

  try{
    const res = await fetch('/api/generate',{ // CALLS VERCEL BACKEND
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[...history,{role:'user',parts:[{text:prompt}]}], userId, isPro}),
      signal:abortController.signal
    });

    if(!res.ok){
      const err = await res.json();
      return updateMessage(msgId, `⚠️ ${err.error}`);
    }

    const reader = res.body.getReader();
    let fullText = '';
    while(true){
      const {value,done} = await reader.read();
      if(done)break;
      const chunk = new TextDecoder().decode(value);
      const matches = chunk.match(/"text": "([^"]+)"/g);
      if(matches){
        matches.forEach(m=>{
          fullText += m.replace(/"text": "/,'').replace(/"$/,'').replace(/\\n/g,'\n');
          updateMessage(msgId,fullText);
        })
      }
    }
    chat.messages.find(m=>m.id===msgId).content=fullText;
    saveChats();
  }catch(e){updateMessage(msgId,"Network error. Please retry.")}
}

function updateMessage(id,text){
  const lastBubble = document.querySelector('#messages.message:last-child.bubble div');
  if(lastBubble)lastBubble.innerHTML=renderMarkdown(text);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

/* ================= MARKDOWN + UTILS ================= */
function renderMarkdown(text){
  return text.replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\*(.*?)\*/g,'<i>$1</i>').replace(/\n/g,'<br>').replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" style="color:var(--accent)">$1</a>');
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open')?'block':'none';}
function loadHistory(){document.getElementById('historyList').innerHTML = chats.map(c=>`<div class="sidebar-item" onclick="loadChat(${c.id})">${c.title}</div>`).join('');}
function saveChats(){localStorage.setItem('aura_chats',JSON.stringify(chats))}
function rotateTitle(){const titles=["ASK FOR ANYTHING","Let's create something","Need ideas?","What's on your mind?"];let i=0;setInterval(()=>{if(document.getElementById('dynamicTitle'))document.getElementById('dynamicTitle').textContent=titles[i++%titles.length]},3000)}
document.getElementById('input').oninput=function(){this.style.height='auto';this.style.height=this.scrollHeight+'px'}

/* ================= ADSTERRA GATE ================= */
function prepareDownload() {
  const modal = document.createElement('div');
  modal.id = 'download-gateway-modal';
  modal.innerHTML = `<div style="background: #161a22; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; border: 1px solid #2d3748;"><h3 style="color: #fff; margin-bottom: 10px;">Support Aura AI</h3><p style="color: #a0aec0; margin-bottom: 24px;">Click below to continue. Free users see 1 ad every 5 messages.</p><button id="final-download-btn" style="background: #ff7a00; color: #fff; border: none; padding: 14px 30px; font-size: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;">Continue & Chat</button></div>`;
  document.body.appendChild(modal);
  document.getElementById('final-download-btn').addEventListener('click', () => {
    window.open(ADSTERRA_LINK, '_blank');
    document.getElementById('download-gateway-modal').remove();
  });
}
</script>
</body>
      </html>
