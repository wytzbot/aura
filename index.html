<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura</title>
<style>
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; }
    .message { margin-bottom: 15px; max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #2563eb; margin-left: auto; }
    .ai { background: #1f1f1f; margin-right: auto; }
    #input-area { display: flex; padding: 15px; background: #181818; border-top: 1px solid #333; }
    #userInput { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #eee; font-size: 16px; }
    #sendBtn { margin-left: 10px; padding: 12px 20px; border: none; border-radius: 8px; background: #2563eb; color: white; font-weight: bold; cursor: pointer; }
    #sendBtn:disabled { background: #444; cursor: not-allowed; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Message Aura..." autocomplete="off">
    <button id="sendBtn">Send</button>
</div>

<script>
const chatDiv = document.getElementById('chat');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

let chatHistory = []; // {role: 'user'/'model', parts: [{text: ''}]}

function addMessage(text, role) {
    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', role === 'user' ? 'user' : 'ai');
    const contentDiv = document.createElement('div');
    contentDiv.classList.add('message-content');
    contentDiv.textContent = text;
    messageDiv.appendChild(contentDiv);
    chatDiv.appendChild(messageDiv);
    chatDiv.scrollTop = chatDiv.scrollHeight;
    return messageDiv;
}

async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    chatHistory.push({ role: 'user', parts: [{ text: text }] });
    userInput.value = '';
    sendBtn.disabled = true;

    const aiMessageDiv = addMessage('', 'ai');
    const aiMessageContent = aiMessageDiv.querySelector('.message-content');

    try {
        // KEY: Call our Vercel backend, not Google directly
        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: chatHistory,
                isPro: false // change to true if user is paid
            })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || 'API request failed');
        }

        // Stream the response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let aiResponse = "";
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            aiResponse += decoder.decode(value, { stream: true });
            aiMessageContent.textContent = aiResponse;
        }
        
        // Save AI response to history
        chatHistory.push({ role: 'model', parts: [{ text: aiResponse }] });

    } catch (error) {
        aiMessageContent.textContent = `Error: ${error.message}`;
        console.error(error);
    } finally {
        sendBtn.disabled = false;
        userInput.focus();
    }
}

sendBtn.addEventListener('click', sendMessage);
userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
